<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="630" viewBox="0 0 1060 630" role="img" aria-labelledby="title desc">
  <title id="title">COSHH Form Builder social preview</title>
  <desc id="desc">Research lab COSHH assessment tool with EH40 and PubChem references.</desc>
  <defs>
    <linearGradient id="accentBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Flat background -->
  <rect width="1060" height="630" fill="#1c1c1c" rx="20"/>

  <!-- Single accent left border bar -->
  <rect x="0" y="0" width="6" height="630" rx="3" fill="url(#accentBorder)"/>

  <!-- Label -->
  <text x="80" y="110" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="4">RESEARCH LAB COSHH SUPPORT</text>

  <!-- Main title -->
  <text x="80" y="210" fill="#f0f0f0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">COSHH Form Builder</text>

  <!-- Thin rule under title -->
  <rect x="80" y="228" width="900" height="1" fill="#333333"/>

  <!-- Subtitle lines -->
  <text x="80" y="274" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="26">Create COSHH assessments with practical guidance,</text>
  <text x="80" y="310" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="26">EH40 reference support, and PubChem hazard lookup.</text>
  <text x="80" y="346" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="26">Draft, review, and export — all in the browser.</text>

  <!-- Feature badges — tighter, moved up -->
  <g transform="translate(80 386)">
    <rect width="242" height="70" rx="8" fill="#252525" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
    <text x="18" y="26" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="1">EH40</text>
    <text x="18" y="52" fill="#cccccc" font-family="Arial, Helvetica, sans-serif" font-size="21">Exposure references</text>
  </g>
  <g transform="translate(338 386)">
    <rect width="272" height="70" rx="8" fill="#252525" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="18" y="26" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="1">PUBCHEM</text>
    <text x="18" y="52" fill="#cccccc" font-family="Arial, Helvetica, sans-serif" font-size="21">Hazard lookup support</text>
  </g>
  <g transform="translate(626 386)">
    <rect width="318" height="70" rx="8" fill="#252525" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="18" y="26" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="1">BROWSER-BASED TOOL</text>
    <text x="18" y="52" fill="#cccccc" font-family="Arial, Helvetica, sans-serif" font-size="21">Draft, review, and export</text>
  </g>

  <!-- Footer rule -->
  <rect x="80" y="484" width="900" height="1" fill="#2e2e2e"/>

  <!-- Footer — URL and name on same line, close together -->
  <text x="80" y="516" fill="#f0f0f0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">coshh.uk</text>
  <text x="240" y="516" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="19">·</text>
  <text x="262" y="516" fill="#aaaaaa" font-family="Arial, Helvetica, sans-serif" font-size="19">Dr. John Thomas Prabhakar</text>
</svg>
